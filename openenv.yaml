spec_version: 1

name: it_mental_health_env
version: "1.0.0"
description: >
  A reinforcement learning environment for mental health assessment and
  intervention planning in IT and software engineering teams. Agents solve
  three progressively harder tasks: burnout detection, stress triage, and
  team-level intervention planning. Each task returns a normalized reward in
  the 0.0-1.0 range based on rubric coverage, structure, and clinical accuracy.

type: typed

runtime:
  language: python
  version: "3.11"

app:
  module: server.app
  object: app

port: 7860

tasks:
  - id: burnout_detection
    difficulty: easy
    description: Identify Maslach burnout dimensions and severity from an employee profile
    reward_range: [0.0, 1.0]
    grader: burnout_detection_grader
    graders:
      - burnout_detection_grader

  - id: stress_triage
    difficulty: medium
    description: Triage 3 IT employees by stress tier and recommend immediate actions
    reward_range: [0.0, 1.0]
    grader: stress_triage_grader
    graders:
      - stress_triage_grader

  - id: intervention_plan
    difficulty: hard
    description: Design a 4-week mental health intervention plan for a burned-out IT team
    reward_range: [0.0, 1.0]
    grader: intervention_plan_grader
    graders:
      - intervention_plan_grader

graders:
  module: graders
  registry: GRADERS
  task_grader_pairs: TASK_GRADER_PAIRS

action_space:
  type: text
  fields:
    response: str
    task_id: str
    confidence: float
    metadata: dict

observation_space:
  type: text
  fields:
    scenario: str
    feedback: str
    reward: float
    done: bool
    score_breakdown: dict
    task_id: str

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  health: GET /health
  tasks: GET /tasks
  schema: GET /schema

author: "IT Mental Health OpenEnv - Scaler x Meta-PyTorch Hackathon 2026"
license: MIT
